name: Upgrade Tests

on:
  # TODO: Remove pull_request trigger before merging — added only to test the workflow on this branch
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      old_version:
        description: "Old version tag to upgrade from (must be >= 1.3.328)"
        required: true
        default: "1.3.335"

concurrency:
  group: upgrade-tests-${{ github.ref }}
  cancel-in-progress: false

jobs:
  upgrade_test:
    name: Upgrade from ${{ github.event.inputs.old_version || '1.3.335' }}
    runs-on: [self-hosted, macOS]

    env:
      OLD_VERSION: ${{ github.event.inputs.old_version || '1.3.335' }}

    steps:
      - name: Setup simulator for runner
        run: |
          SIMULATOR_NAME="${{ runner.name }}-iPhone"
          echo "SIMULATOR_NAME=$SIMULATOR_NAME" >> $GITHUB_ENV
          xcrun simctl list devices -j | jq -r ".devices[][] | select(.name == \"$SIMULATOR_NAME\") | .udid" | xargs -I {} xcrun simctl delete {} 2>/dev/null || true
          xcrun simctl create "$SIMULATOR_NAME" "iPhone 17"

      # Phase 1: Build and run old version to create wallet
      - name: Checkout old version
        uses: actions/checkout@v4
        with:
          ref: ${{ env.OLD_VERSION }}
          submodules: true

      - name: Install dependencies (old)
        run: just install-toolchains

      - name: Build Core (old)
        run: just generate-stone

      - name: Resolve SPM Dependencies (old)
        run: xcodebuild -resolvePackageDependencies -project Gem.xcodeproj -scheme Gem -derivedDataPath build/DerivedData -clonedSourcePackagesDirPath build/SourcePackages

      - name: Build for Testing UI (old)
        run: |
          set -o pipefail && xcodebuild -project Gem.xcodeproj \
            -scheme GemUITests \
            -testPlan ui_tests \
            ONLY_ACTIVE_ARCH=YES \
            -destination "platform=iOS Simulator,name=$SIMULATOR_NAME" \
            -derivedDataPath build/DerivedData \
            -clonedSourcePackagesDirPath build/SourcePackages \
            -allowProvisioningUpdates \
            -allowProvisioningDeviceRegistration \
            build-for-testing | xcbeautify --quieter --is-ci

      - name: Reset simulator
        run: just reset-simulator

      - name: "Phase 1: Create wallet on old version"
        run: |
          set -o pipefail && xcodebuild -project Gem.xcodeproj \
            -scheme GemUITests \
            -testPlan ui_tests \
            ONLY_ACTIVE_ARCH=YES \
            -destination "platform=iOS Simulator,name=$SIMULATOR_NAME" \
            -derivedDataPath build/DerivedData \
            -clonedSourcePackagesDirPath build/SourcePackages \
            -allowProvisioningUpdates \
            -allowProvisioningDeviceRegistration \
            -only-testing GemUITests/ImportWalletReceiveBitcoinUITests \
            test-without-building | xcbeautify --quieter --is-ci

      # Phase 2: Build and run current version to verify wallet survived
      - name: Checkout current branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          submodules: true
          clean: false

      - name: Install dependencies (current)
        run: just install-toolchains

      - name: Build Core (current)
        run: just generate-stone

      - name: Resolve SPM Dependencies (current)
        run: just spm-resolve

      - name: Build for Testing (current)
        run: just build-for-testing-ui

      - name: "Phase 2: Verify wallet survived upgrade"
        run: just test-upgrade-verify
